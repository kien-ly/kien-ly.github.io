baseURL = "https://kien-ly.github.io/"
languageCode = "vi"
title = "Kien Ly"
theme = "PaperMod"
[pagination]
  pagerSize = 5
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[taxonomies]
  tag = "tags"
  category = "categories"

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Kien Ly"
  description = "Portfolio & Blog cá nhân"
  keywords = ["Blog", "Portfolio", "Developer"]
  author = "Kien Ly"
  # author = ["Me", "You"] # multiple authors

  defaultTheme = "auto"        # auto | light | dark
  disableThemeToggle = false   # cho phép đổi sáng/tối

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.assets]
    # favicon = "<link / abs url>"
    # favicon16x16 = "<link / abs url>"
    # favicon32x32 = "<link / abs url>"
    # apple_touch_icon = "<link / abs url>"
    # safari_pinned_tab = "<link / abs url>"

  [params.label]
    text = "Home"
    # icon = "/apple-touch-icon.png"
    # iconHeight = 35

  # Profile mode - trang chủ dạng profile
  [params.profileMode]
    enabled = true
    imageUrl = "https://github.com/kien-ly.png"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "Avatar"

    [[params.profileMode.buttons]]
      name = "Blog"
      url = "/posts"

    [[params.profileMode.buttons]]
      name = "Projects"
      url = "/projects"

    [[params.profileMode.buttons]]
      name = "News"
      url = "/news"


  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/kien-ly"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/kienly"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:kienly.work@gmail.com"

  [params.analytics.google]
    SiteVerificationTag = ""  # ← Thêm Google Analytics nếu muốn

  [params.cover]
    hidden = true
    hiddenInList = true
    hiddenInSingle = true

  [params.editPost]
    # URL = "https://github.com/kien-ly/kien-ly.github.io/edit/main/content"
    # Text = "Suggest Changes"
    # appendFilePath = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20

  [[menu.main]]
    identifier = "news"
    name = "News"
    url = "/news/"
    weight = 30

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 40

  [[menu.main]]
    identifier = "mycv"
    name = "My CV"
    url = "/mycv/"
    weight = 50

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 60

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]  # JSON cần cho search
